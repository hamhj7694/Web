<!-- 웹문서 .html의 실행은 웹 브라우저로 문서를 보여주는 것임 -->
<!-- 이를 편하게 해주는 VScode 확장프로그램 [Open in browser] 설치 -->

<!DOCTYPE html>
<html>
    <!-- 1. 화면에 보이지 않는 영역 (주소줄 영역), 웹문서를 설명하는 내용들 작성 -->
    <head>
        <title>페이지 1</title>

        <style>
            p{color: red;}
        </style>
    </head>

    <!-- 2. 브라우저의 화면 영역 -->
    <body>
        <p>Hello Web</p>

    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <!-- head만 하나만 적용되고, 그 외에는 다 적용됨 -->
        <title>페이지 2</title>
        
        <style>
            p{color: blue;}
        </style>
    </head>
    <body>
        <p>홀리몰리 이러면 안되는데 어떻게 되지?</p>
    </body>
</html>

<!-- html 요소 밖에 글씨를 써도 보임 -->
Good JAB!
