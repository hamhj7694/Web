<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>테이블 요소 연습</title>
    </head>
    <body>

        <h2>Table 요소 연습</h2>

        <table border="1"> <!-- 전체 표 -->
            
            <tr> <!-- 표 첫줄(라벨) -->
                <th>번호</th>
                <th>이름</th>
                <th>메시지</th>
            </tr>
            <tr> <!-- 표 내용(테이블 데이터) -->
                <td>1</td>
                <td>함형준</td>
                <td>안녕 테이블</td>
            </tr>
            <tr>
                <td>2</td>
                <td>hhj</td>
                <td>HI</td>
                <!-- 각 행(row)의 셀(칸) 개수가 달라도 됨 -->
                <td>2026-05-26</td>
            </tr>
            
            <!-- 표 제목 표시하기 (작성 위치와 상관없이 상단에 표시됨) -->
            <caption>테이블의 제목</caption>

        </table>

        <hr>

        <!-- 테이블 칸(셀) 안에 다른 요소 넣어보기 -->
        <table border="1" width="100%">
            <tr>
                <td width = "30%">
                    <a href="https://www.naver.com/">네이버로 이동</a>
                </td>
                <td>
                    <ul>
                        <li>aaa</li>
                        <li>bbb</li>
                        <li>ccc</li>
                    </ul>
                </td>
            </tr>
            <tr>
                <td>
                    <p>테이블 안에 어떤 요소든 넣을 수 있고, 한글이면 자동 줄바꿈을 합니다!</p>
                    <p>eeeeee iujsdjfosdfkdposkorlnrhfhfc</p>
                </td>
                <td>
                    <img src="./image/PIA03149_hithumb.jpg" alt="태양" width="70%">
                </td>
            </tr>
        </table>

        <hr>

        <table border="1">
            <tr>
                <!-- 다음 줄이 없으면 스판은 발생하지 않음 -->
                <td rowspan="2">111</td>
                <td colspan="3">222</td>
                <td>333</td>
            </tr>
            <tr>
                <td>444</td>
                <td>555</td>
                <td>666666</td>
                <td>777</td>
                <td>888</td>
            </tr>

        </table>

    </body>
</html>
