<!-- GET, POST -->

<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>HTTP 리퀘스트 연습</title>
    </head>
    <body>
        <h2>HTTP REQUEST TEST PAGE</h2>

        <!-- form 요소 : 앵커 요소처럼 다른 문서를 실행하지만, 데이터를 전달할 수 있고. 이동하기 위한 별도의 input 요소가 필요! (백엔드 프로그램(php)을 실행하고 데이터를 전달하는 요소) -->
        <!-- GET 방식 : 보낼 데이터를 URL 뒤에 ? 붙여서 전달하는 방식 -->
        <form action="./aaa.php" method="get">
            <input type="text" placeholder="제목 입력" name="title">
            <input type="text" placeholder="메시지 입력" name="msg">

            <input type="submit">
        </form>
        
        <!-- 2. POST 방식 : 데이터를 숨겨서 보내는 방식 -->
        <fieldset>
            <legend>POST 방식 테스트</legend>
            <form action="./bbb.php" method="post">
                <label for="in1">아이디: </label>
                <input type="text" name="user_id" id="in1">
                <br>

                <label>비밀번호: <input type="password" name="user_pw"></label>
                <br>

                <p>
                    성별:
                    <label><input type="radio" name="gender" value="male">남성</label>
                    <label><input type="radio" name="gender" value="female" checked>여성</label>
                </p>

                <p>
                    당신이 좋아하는 과일을 모두 선택 하십시오.
                    <br>
                    <label><input type="checkbox" name="fruits[]" value="apple" checked>사과</label> &nbsp; &nbsp;
                    <label><input type="checkbox" name="fruits[]" value="banana" checked>바나나</label> &nbsp; &nbsp;
                    <label><input type="checkbox" name="fruits[]" value="orange" checked>오렌지</label> &nbsp; &nbsp;
                </p>

                <p>
                    메시지: <br>
                    <textarea name="msg" cols="40" rows="4"></textarea>
                </p>

                <div>
                    <select name="brand">
                        <optgroup label="자동차 브랜드">
                            <option value="현대">현대</option>
                            <option value="기아" selected>기아</option>
                            <option value="KGM">KGM</option>
                        </optgroup>
                    </select>
                </div>
                <hr>
                <input type="submit" value="서버 전송">
                <input type="reset" value="작성 취소">

            </form>
        </fieldset>
    
    </body>
</html>
