<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>파일 업로드</title>
    </head>
    <body>
        
        <h2>파일 업로드 페이지 입니다.</h2>

        <!-- 파일을 전송할 때는, key = value 방식이 아니라, 다른 방식으로 보내야 함. -->
        <form action="./bbb.php" method="post" enctype="multipart/form-data"> <!-- 파일 전송 위해서는 이 인코딩 타입 선택 필수!  -->
            <!-- 파일을 선택할 수 있는 요소 -->
            <input type="file" name="img1"> 
            <input type="submit" value="파일 전송">
        </form>


    </body>
</html>
