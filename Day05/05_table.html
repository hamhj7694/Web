<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>테이블 스타일</title>
    </head>

    <style>

        table{
            width: 300px;
            border: 2px solid black;
            /* 내부 실선이 2줄로 그려지는 것이 싫다면... 두 선을 합치기 */
            border-collapse: collapse;
            /* 안에 있는 글씨들 가운데 정렬 */
            text-align: center;
        }

        th, td{border: 1px solid black; padding: 10px 5px;} /* 위아래 여백 10px, 좌우 여백 5px 줌 */

        /* 제목 줄 칸들에 배경 색 지정 */
        th{background-color: green; color: white}

        /* 짝수 줄만 별도 배경색 지정 */
        tr:nth-child(2n){background-color: gainsboro;}

        /* 첫번째 칸들의 너비 지정 */
        td:first-child{width: 40%;}

        /* 제목 줄 아래 경계선을 빨간색으로 */
        th{border-bottom: 1.5px double red;}

        /* 직접 만들지는 않았지만.. 그래서 보이지는 않지만.. 실제 테이블 안에 존재하는 자식 요소 존재 tbody */
        table>:nth-child(1){border: 10px solid blue;}

        /* 그래서 보통, 테이블 작업할 때.. 자식선택자 대신 자손선택자를 권장함. */
        table>tr{color: red;} /* 대상 없음 */
        table tr{color: pink;}

    </style>

    <body>
        
        <table>
            <!-- 여기에 tbody가 있고, 그거의 자식들이 tr들이다! -->
            <tr>
                <th>이름</th>
                <th>이메일</th>
            </tr>
            <tr>
                <td>손흥민</td>
                <td>aaa@abc.com</td>
            </tr>
            <tr>
                <td>김민재</td>
                <td>bbb@abc.com</td>
            </tr>
            <tr>
                <td>이강인</td>
                <td>ccc@abc.com</td>
            </tr>
            <tr>
                <td>함형준</td>
                <td>ham@abc.com</td>
            </tr>
        </table>

    </body>
</html>
